name: Feature request
description: Propose a new capability or improvement.
title: "[Feature]: "
labels:
  - enhancement
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: One-line description of the feature.
      placeholder: Support Discord as an IM platform.
    validations:
      required: true
  - type: textarea
    id: problem
    attributes:
      label: Problem to solve
      description: What pain point this addresses and why current behavior is insufficient.
      placeholder: Teams using Discord cannot interact with the bot without switching to Feishu or Slack.
    validations:
      required: true
  - type: textarea
    id: proposed_solution
    attributes:
      label: Proposed solution
      description: Desired behavior, API, or configuration.
      placeholder: Add a Discord adapter implementing the IMPlatform interface, configured via IM_PLATFORM=discord.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches and why they are weaker.
      placeholder: Bridging Discord to Slack adds latency and complexity.
  - type: textarea
    id: additional
    attributes:
      label: Additional context
      description: Screenshots, references, or constraints.
