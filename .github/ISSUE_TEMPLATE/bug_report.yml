name: Bug report
description: Report a defect or unexpected behavior.
title: "[Bug]: "
labels:
  - bug
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: One-sentence description of the bug.
      placeholder: "After upgrading to v0.0.34, the bot fails to create PRs on GitHub."
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      description: Shortest path to reproduce the issue.
      placeholder: |
        1. Configure GitHub App auth.
        2. Send a task message in Feishu.
        3. Observe error in logs.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      placeholder: A draft PR is created on GitHub.
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: Include error messages or log output.
      placeholder: "ERROR [pr-creator] GitHub API error {\"status\":404}"
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: DevOps Bot version
      placeholder: v0.0.34
    validations:
      required: true
  - type: input
    id: os
    attributes:
      label: Operating system
      placeholder: macOS 15.4 / Ubuntu 24.04
    validations:
      required: true
  - type: dropdown
    id: im_platform
    attributes:
      label: IM Platform
      options:
        - Feishu / Lark
        - Slack
        - N/A
  - type: dropdown
    id: ai_provider
    attributes:
      label: AI Provider
      options:
        - Anthropic (Claude)
        - OpenAI
        - OpenAI-compatible
        - N/A
  - type: textarea
    id: logs
    attributes:
      label: Logs / screenshots
      description: Paste relevant (redacted) logs or attach screenshots.
      render: shell
